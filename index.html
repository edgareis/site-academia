<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academia Feminina Adnanref</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* RESET E FONTES */
* {margin:0; padding:0; box-sizing:border-box;}
body {font-family:Poppins, sans-serif; background-color:#F5F5F5;}

/* CABEÇALHO */
header {
  background-color: #1A1A2E; /* azul marinho escuro */
  color: #FFFFFF;
  position: fixed;
  width: 100%;
  top: 0;
  padding: 15px;
  z-index: 1000;
}

/* BOTÕES */
.btn {
  padding: 12px 25px;
  border-radius: 25px;
  text-decoration: none;
  display: inline-block;
  margin: 10px;
  transition: 0.3s;
}

.btn-primary {
  background-color: #FF7F50; /* coral acento */
  color: #FFFFFF;
}

.btn-primary:hover {
  background-color: #e76b3e; /* efeito hover suave */
}

.btn-secondary {
  border: 2px solid #FFFFFF;
  color: #FFFFFF;
}

/* HERO */
.hero {
  height: 100vh;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
              url('https://images.unsplash.com/photo-1554284126-aa88f22d8b74');
  background-size: cover;
  background-position: center;
  color: #FFFFFF;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding-top: 80px;
}

/* SEÇÕES */
section {
  padding: 80px 20px;
}

/* CONTATO / FOOTER */
.contact {
  background-color: #1A1A2E; /* azul marinho escuro */
  color: #FFFFFF;
}

.contact-form input,
.contact-form textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border: none;
  border-radius: 10px;
}

/* BOTÃO FLUTUANTE WHATSAPP */
.whatsapp-float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: #FFFFFF;
  font-size: 28px;
  padding: 15px;
  border-radius: 50%;
  z-index: 1000;
}

/* STATUS BADGE */
.status-badge {
  position: fixed;
  top: 80px;
  right: 20px;
  background: red;
  color: #FFFFFF;
  padding: 10px 20px;
  border-radius: 20px;
}

.status-badge.open {background: green;}
</style>
</head>

<body>

<header>
<h2>Adnanref</h2>
</header>

<div class="status-badge" id="statusBadge">Carregando...</div>

<section class="hero">
<div>
<h1>Academia Feminina</h1>
<p>Transformando mulheres há 27 anos 💖</p>

<a href="#contact" class="btn btn-primary">Agendar</a>
<a href="https://wa.me/5513988585366" class="btn btn-secondary">WhatsApp</a>
</div>
</section>

<section id="contact" class="contact">
<h2>Contato</h2>

<form class="contact-form" onsubmit="submitForm(event)">
<input type="text" id="nome" placeholder="Nome" required>
<input type="tel" id="telefone" placeholder="Telefone" required>
<textarea id="mensagem" placeholder="Mensagem"></textarea>

<button class="btn btn-primary" type="submit">
Enviar pelo WhatsApp
</button>
</form>

</section>

<!-- BOTÃO WHATSAPP -->
<a href="https://wa.me/5513988585366" class="whatsapp-float" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

<script>
function submitForm(e){
  e.preventDefault();

  const nome = document.getElementById('nome').value;
  const telefone = document.getElementById('telefone').value;
  const mensagem = document.getElementById('mensagem').value;

  const texto = `Olá! Me chamo ${nome}%0A📞 ${telefone}%0A💬 ${mensagem}`;
  window.open(`https://wa.me/5513988585366?text=${texto}`);
}

function atualizarStatus(){
  const agora = new Date();
  const h = agora.getHours();
  const d = agora.getDay();
  const badge = document.getElementById("statusBadge");

  if(d >= 1 && d <= 5){
    if(h >= 6 && h < 22){
      badge.innerHTML = "🟢 Aberto agora";
      badge.classList.add("open");
    } else {
      badge.innerHTML = "🔴 Fechado - Abre 06:00";
      badge.classList.remove("open");
    }
  } else if(d == 6){
    if(h >= 8 && h < 12){
      badge.innerHTML = "🟢 Aberto agora";
      badge.classList.add("open");
    } else {
      badge.innerHTML = "🔴 Fechado - Abre 08:00";
      badge.classList.remove("open");
    }
  } else {
    badge.innerHTML = "🔴 Fechado hoje";
    badge.classList.remove("open");
  }
}

atualizarStatus();
</script>

</body>
</html>
